<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FraudShield AI - Next Gen Fraud Monitoring</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        .hero-section {
            background: var(--grad-hero);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero-bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
            top: -200px;
            right: -200px;
        }

        .hero-content h1 {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .hero-content p {
            font-size: 1.5rem;
            color: var(--sidebar-text);
            max-width: 800px;
            margin: 0 auto 3rem;
        }

        .nav-brand {
            position: absolute;
            top: 2rem;
            left: 5%;
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
    </style>
</head>

<body class="landing-body">
    <div class="hero-section">
        <div class="hero-bg-glow"></div>
        <div class="nav-brand">
            <span style="font-size: 2rem;">🛡️</span>
            <span class="gradient-text">FraudShield AI</span>
        </div>

        <div class="hero-content">
            <div class="badge">TRUSTED BY 50+ FINTECH PARTNERS</div>
            <h1>The Intelligence Layer for <br><span class="gradient-text">Modern Payment Security</span></h1>
            <p>Real-time transaction monitoring, UPI verification, and AI-powered fraud prevention for digital-first
                enterprises.</p>

            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                <a href="/login" class="btn-primary-glow"
                    style="text-decoration: none; padding: 1.5rem 3rem; font-size: 1.2rem;">
                    Launch Mission Control 🚀
                </a>
            </div>

            <div style="margin-top: 5rem; display: flex; gap: 4rem; justify-content: center; opacity: 0.5;">
                <span style="font-weight: 700; letter-spacing: 0.2rem;">PCI COMPLIANT</span>
                <span style="font-weight: 700; letter-spacing: 0.2rem;">SOC2 TYPE II</span>
                <span style="font-weight: 700; letter-spacing: 0.2rem;">AI-DRIVEN</span>
            </div>
        </div>
    </div>
</body>

</html>
